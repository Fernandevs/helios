<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <linearGradient id="sunGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c0c1ff" />
      <stop offset="50%" stop-color="#ddb7ff" />
      <stop offset="100%" stop-color="#4fdbc8" />
    </linearGradient>
    <radialGradient id="glowGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c0c1ff" stop-opacity="0.35" />
      <stop offset="100%" stop-color="#131315" stop-opacity="0" />
    </radialGradient>
  </defs>
  <!-- Background Glow -->
  <circle cx="16" cy="16" r="16" fill="url(#glowGradient)" />
  <!-- Dotted Orbit Line -->
  <circle cx="16" cy="16" r="13" stroke="#c0c1ff" stroke-width="0.75" stroke-opacity="0.3" stroke-dasharray="2 2" />
  <!-- Stylized Helios 'H' shaped magnetic field lines -->
  <path d="M10,6 C13,10 13,22 10,26" stroke="url(#sunGradient)" stroke-width="2" stroke-linecap="round" />
  <path d="M22,6 C19,10 19,22 22,26" stroke="url(#sunGradient)" stroke-width="2" stroke-linecap="round" />
  <!-- Planetary alignment bridge -->
  <path d="M12.3,16 L19.7,16" stroke="url(#sunGradient)" stroke-width="2" stroke-linecap="round" />
  <!-- Central Solar Core (Helios) -->
  <circle cx="16" cy="16" r="3.5" fill="#c0c1ff" />
  <circle cx="16" cy="16" r="2" fill="#e5e1e4" />
  <!-- Solar flare sparks -->
  <circle cx="16" cy="7.5" r="1" fill="#4fdbc8" />
  <circle cx="16" cy="24.5" r="1" fill="#4fdbc8" />
  <circle cx="7.5" cy="16" r="1" fill="#ddb7ff" />
  <circle cx="24.5" cy="16" r="1" fill="#ddb7ff" />
</svg>
